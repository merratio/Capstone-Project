# ??? Database ?????????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/offchaindB
spring.datasource.username=myuser
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ??? Logging ??????????????????????????????????????????????????????????????????
logging.level.org.hibernate.SQL=DEBUG

# ??? Auth0 ? Management API (used by Auth0ManagementService) ?????????????????
# Your Auth0 tenant domain ? no https:// prefix
auth0.domain=YOUR_TENANT.auth0.com

# Machine-to-Machine app credentials (used to call the Management API)
# Store the secret via environment variable: AUTH0_CLIENT_SECRET
auth0.client-id=YOUR_M2M_CLIENT_ID
auth0.client-secret=${AUTH0_CLIENT_SECRET:YOUR_M2M_CLIENT_SECRET}

# Management API audience ? always https://<domain>/api/v2/
auth0.management-api-audience=https://YOUR_TENANT.auth0.com/api/v2/

# Auth0 database connection name
auth0.connection=Username-Password-Authentication

# ??? Auth0 ? JWT / Resource Server (used by Spring Security) ?????????????????
# issuer-uri must match the `iss` claim in tokens issued by your tenant.
# Spring Boot uses this to auto-discover the JWKS endpoint and validate tokens.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://YOUR_TENANT.auth0.com/

# audience must match the Identifier (audience) of the API you created in Auth0.
# e.g. https://capstone-api  ? set to whatever you entered in the Auth0 dashboard.
auth0.audience=https://YOUR_API_AUDIENCE